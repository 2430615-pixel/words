<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평가원 기출 마스터 - 스마트 수능 영단어장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg:   '#0F172A',
                        cardbg:   '#1E293B',
                        primary:  '#10B981',
                        secondary:'#8B5CF6',
                        accent:   '#F59E0B',
                        bordercol:'#334155'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #0F172A; color: #E2E8F0; margin: 0; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .card-back { transform: rotateY(180deg); }
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { background: #10B981; color: white; }
        .word-item:hover { background: #1E293B; }
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #1E293B; color: white; padding: 12px 24px;
            border-radius: 8px; z-index: 9999; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            border: 1px solid #334155;
        }
        .toast.show { opacity: 1; }
        #quiz-choices button { transition: background 0.2s; }
        #quiz-choices button:hover { background: #334155; }
        #quiz-choices button.correct { background: #065f46 !important; border-color: #10B981 !important; }
        #quiz-choices button.wrong   { background: #7f1d1d !important; border-color: #ef4444 !important; }
        .streak-cell { width: 12px; height: 12px; border-radius: 2px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen">

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Header -->
<header class="sticky top-0 z-50 bg-darkbg/90 backdrop-blur border-b border-bordercol px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-primary text-xl"></i>
            <span class="font-bold text-lg text-white">평가원 기출 마스터</span>
        </div>
        <div class="flex items-center gap-3 text-sm text-slate-400">
            <span id="header-progress">0 / 0 학습</span>
            <span id="header-streak" class="text-accent"><i class="fa-solid fa-fire mr-1"></i><span id="streak-count">0</span>일 연속</span>
        </div>
    </div>
</header>

<!-- Tab Navigation -->
<nav class="sticky top-[57px] z-40 bg-darkbg border-b border-bordercol px-4">
    <div class="max-w-4xl mx-auto flex gap-1 py-2">
        <button onclick="switchTab('flashcard')" id="tab-flashcard" class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium">
            <i class="fa-solid fa-clone mr-1"></i>단어장
        </button>
        <button onclick="switchTab('quiz')" id="tab-quiz" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-400">
            <i class="fa-solid fa-brain mr-1"></i>퀴즈
        </button>
        <button onclick="switchTab('list')" id="tab-list" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-400">
            <i class="fa-solid fa-list mr-1"></i>단어 목록
        </button>
        <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-400">
            <i class="fa-solid fa-chart-bar mr-1"></i>통계
        </button>
    </div>
</nav>

<main class="max-w-4xl mx-auto px-4 py-6">

    <!-- ========== FLASHCARD TAB ========== -->
    <section id="tab-flashcard-content">
        <!-- Filter bar -->
        <div class="flex flex-wrap gap-2 mb-4">
            <select id="filter-status" onchange="applyFilter()" class="bg-cardbg border border-bordercol rounded-lg px-3 py-2 text-sm text-slate-300">
                <option value="all">전체 단어</option>
                <option value="unlearned">미학습</option>
                <option value="learning">학습 중</option>
                <option value="learned">학습 완료</option>
                <option value="starred">즐겨찾기</option>
                <option value="review">복습 필요</option>
            </select>
            <select id="filter-difficulty" onchange="applyFilter()" class="bg-cardbg border border-bordercol rounded-lg px-3 py-2 text-sm text-slate-300">
                <option value="all">모든 난이도</option>
                <option value="상">상 (어려움)</option>
                <option value="중">중 (보통)</option>
                <option value="하">하 (쉬움)</option>
            </select>
            <div class="ml-auto text-sm text-slate-400 flex items-center">
                <span id="filter-count">0개</span>
            </div>
        </div>

        <!-- Flashcard -->
        <div class="card-flip w-full" style="height: 280px;">
            <div class="card-inner w-full h-full" id="card-inner">
                <!-- Front -->
                <div class="card-front bg-cardbg rounded-2xl border border-bordercol flex flex-col items-center justify-center p-8 cursor-pointer select-none" onclick="flipCard()">
                    <p class="text-xs text-primary font-semibold tracking-widest uppercase mb-2" id="card-part">품사</p>
                    <h2 class="text-4xl font-bold text-white mb-3" id="card-front-word">단어</h2>
                    <p class="text-xs text-slate-500">카드를 클릭하면 뜻이 나옵니다</p>
                    <div class="absolute top-4 right-4 flex gap-2">
                        <span id="card-difficulty-badge" class="text-xs px-2 py-1 rounded-full bg-slate-700 text-slate-300"></span>
                        <button onclick="event.stopPropagation();toggleStar()" id="star-btn" class="text-slate-500 hover:text-accent transition-colors">
                            <i class="fa-regular fa-star text-lg"></i>
                        </button>
                    </div>
                    <div class="absolute bottom-4 left-4 text-xs text-slate-600" id="card-counter">1 / 1</div>
                </div>
                <!-- Back -->
                <div class="card-back bg-cardbg rounded-2xl border border-primary/40 flex flex-col items-center justify-center p-8 cursor-pointer select-none" onclick="flipCard()">
                    <p class="text-xs text-primary font-semibold tracking-widest uppercase mb-2">뜻</p>
                    <h3 class="text-2xl font-bold text-primary mb-2" id="card-back-meaning">의미</h3>
                    <p class="text-sm text-slate-400 mb-4" id="card-back-example"></p>
                    <!-- Status buttons -->
                    <div class="flex gap-3 mt-2" onclick="event.stopPropagation()">
                        <button onclick="markStatus('hard')" class="px-4 py-2 rounded-lg bg-red-900/40 border border-red-700 text-red-300 text-sm hover:bg-red-900/60 transition">
                            <i class="fa-solid fa-xmark mr-1"></i>어려움
                        </button>
                        <button onclick="markStatus('ok')" class="px-4 py-2 rounded-lg bg-yellow-900/40 border border-yellow-700 text-yellow-300 text-sm hover:bg-yellow-900/60 transition">
                            <i class="fa-solid fa-minus mr-1"></i>보통
                        </button>
                        <button onclick="markStatus('easy')" class="px-4 py-2 rounded-lg bg-emerald-900/40 border border-emerald-700 text-emerald-300 text-sm hover:bg-emerald-900/60 transition">
                            <i class="fa-solid fa-check mr-1"></i>쉬움
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation buttons -->
        <div class="flex items-center justify-center gap-4 mt-6">
            <button onclick="prevCard()" class="flex flex-col items-center gap-1 bg-cardbg hover:bg-slate-700 border border-bordercol rounded-xl px-6 py-3 transition">
                <i class="fa-solid fa-chevron-left text-slate-300"></i>
                <span class="text-[10px] text-slate-400 tracking-tight">이전 카드</span>
            </button>
            <button onclick="toggleStar()" class="flex flex-col items-center gap-1 bg-cardbg hover:bg-slate-700 border border-bordercol rounded-xl px-6 py-3 transition">
                <i class="fa-solid fa-star text-accent"></i>
                <span class="text-[10px] text-slate-400 tracking-tight">즐겨찾기</span>
            </button>
            <button onclick="shuffleCards()" class="flex flex-col items-center gap-1 bg-secondary/20 hover:bg-secondary/30 border border-secondary/50 rounded-xl px-6 py-3 transition">
                <i class="fa-solid fa-shuffle text-secondary"></i>
                <span class="text-[10px] text-slate-400 tracking-tight">랜덤 섞기</span>
            </button>
            <button onclick="nextCard()" class="flex flex-col items-center gap-1 bg-cardbg hover:bg-slate-700 border border-bordercol rounded-xl px-6 py-3 transition">
                <i class="fa-solid fa-chevron-right text-slate-300"></i>
                <span class="text-[10px] text-slate-400 tracking-tight">다음 카드</span>
            </button>
        </div>
    </section>

    <!-- ========== QUIZ TAB ========== -->
    <section id="tab-quiz-content" class="hidden">
        <div class="bg-cardbg rounded-2xl border border-bordercol p-6">
            <!-- Quiz header -->
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-white">단어 퀴즈</h3>
                <div class="text-sm text-slate-400">
                    맞음: <span id="quiz-correct" class="text-emerald-400 font-bold">0</span> /
                    틀림: <span id="quiz-wrong" class="text-red-400 font-bold">0</span>
                </div>
            </div>
            <!-- Progress bar -->
            <div class="w-full bg-slate-700 rounded-full h-2 mb-6">
                <div id="quiz-progress-bar" class="bg-primary h-2 rounded-full transition-all" style="width:0%"></div>
            </div>
            <!-- Question -->
            <div class="text-center mb-6">
                <p class="text-xs text-slate-400 mb-2" id="quiz-direction">다음 영어 단어의 뜻은?</p>
                <h2 class="text-3xl font-bold text-white" id="quiz-word">-</h2>
            </div>
            <!-- Choices -->
            <div id="quiz-choices" class="grid grid-cols-1 gap-3">
                <!-- populated by JS -->
            </div>
            <div id="quiz-result" class="hidden mt-4 text-center">
                <button onclick="nextQuiz()" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-emerald-600 transition">다음 문제 →</button>
            </div>
        </div>
    </section>

    <!-- ========== LIST TAB ========== -->
    <section id="tab-list-content" class="hidden">
        <div class="mb-4 flex gap-2">
            <input type="text" id="search-input" oninput="searchWords()" placeholder="단어 또는 뜻 검색..." 
                   class="flex-1 bg-cardbg border border-bordercol rounded-lg px-4 py-2 text-sm text-white placeholder-slate-500 outline-none focus:border-primary">
        </div>
        <div id="word-list" class="space-y-2 max-h-[70vh] overflow-y-auto pr-1">
            <!-- populated by JS -->
        </div>
    </section>

    <!-- ========== STATS TAB ========== -->
    <section id="tab-stats-content" class="hidden">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-cardbg border border-bordercol rounded-xl p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">전체 단어</p>
                <p class="text-2xl font-bold text-white" id="stat-total">0</p>
            </div>
            <div class="bg-cardbg border border-bordercol rounded-xl p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">학습 완료</p>
                <p class="text-2xl font-bold text-primary" id="stat-learned">0</p>
            </div>
            <div class="bg-cardbg border border-bordercol rounded-xl p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">학습 중</p>
                <p class="text-2xl font-bold text-accent" id="stat-learning">0</p>
            </div>
            <div class="bg-cardbg border border-bordercol rounded-xl p-4 text-center">
                <p class="text-xs text-slate-400 mb-1">연속 학습</p>
                <p class="text-2xl font-bold text-secondary" id="stat-streak">0일</p>
            </div>
        </div>
        <!-- Progress bar -->
        <div class="bg-cardbg border border-bordercol rounded-xl p-4 mb-4">
            <div class="flex justify-between text-sm mb-2">
                <span class="text-slate-400">전체 학습 진행률</span>
                <span class="text-primary font-semibold" id="stat-pct">0%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-3">
                <div id="stat-progress" class="bg-gradient-to-r from-emerald-500 to-primary h-3 rounded-full transition-all"></div>
            </div>
        </div>
        <!-- Streak heatmap -->
        <div class="bg-cardbg border border-bordercol rounded-xl p-4">
            <h4 class="text-sm font-semibold text-white mb-3">학습 스트릭 (최근 3개월)</h4>
            <div id="streak-grid" class="flex flex-wrap gap-1"></div>
            <div class="flex gap-2 mt-3 text-xs text-slate-500 items-center">
                <span>적음</span>
                <div class="streak-cell bg-slate-700"></div>
                <div class="streak-cell bg-emerald-900"></div>
                <div class="streak-cell bg-emerald-700"></div>
                <div class="streak-cell bg-emerald-500"></div>
                <div class="streak-cell bg-emerald-300"></div>
                <span>많음</span>
            </div>
        </div>
    </section>

</main>

// ============================================================
//  상태 (localStorage)
// ============================================================
const STORE_KEY = 'vocabAppState_v3';
let state = {
    words: [],
    currentIdx: 0,
    filteredIds: [],
    quizQueue: [],
    quizIdx: 0,
    quizCorrect: 0,
    quizWrong: 0,
    streak: 0,
    lastStudyDate: '',
    studyLog: {},  // { 'YYYY-MM-DD': count }
};

function saveState() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadState() {
    try {
        const s = JSON.parse(localStorage.getItem(STORE_KEY));
        if (s && s.words && s.words.length > 0) {
            state = Object.assign(state, s);
            return true;
        }
    } catch(e) {}
    return false;
}

// ============================================================
//  초기화
// ============================================================
function init() {
    const saved = loadState();
    if (!saved || state.words.length === 0) {
        // DEFAULT_WORDS에서 단어 로드
        state.words = DEFAULT_WORDS.map(w => ({
            ...w,
            status: w.status || 'unlearned',
            starred: w.starred || false,
            interval: 1,
            repetition: 0,
            ef: 2.5,
            nextReview: '',
        }));
    } else {
        // 저장된 상태에 새 단어 병합
        const savedIds = new Set(state.words.map(w => w.id));
        DEFAULT_WORDS.forEach(w => {
            if (!savedIds.has(w.id)) {
                state.words.push({ ...w, status:'unlearned', starred:false, interval:1, repetition:0, ef:2.5, nextReview:'' });
            }
        });
    }

    updateStreak();
    applyFilter();
    renderList();
    renderStats();
    renderStreakGrid();
    updateHeaderProgress();
    showCard();
    initQuiz();
}

// ============================================================
//  날짜 / 스트릭
// ============================================================
function todayStr() {
    return new Date().toISOString().slice(0, 10);
}
function updateStreak() {
    const today = todayStr();
    if (!state.studyLog) state.studyLog = {};
    if (state.lastStudyDate !== today) {
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0, 10);
        if (state.lastStudyDate === yStr) {
            state.streak = (state.streak || 0) + 1;
        } else if (state.lastStudyDate !== today) {
            state.streak = state.lastStudyDate ? 1 : 0;
        }
        state.lastStudyDate = today;
        if (!state.studyLog[today]) state.studyLog[today] = 0;
        saveState();
    }
    document.getElementById('streak-count').textContent = state.streak;
}
function logStudy() {
    const today = todayStr();
    if (!state.studyLog) state.studyLog = {};
    state.studyLog[today] = (state.studyLog[today] || 0) + 1;
    updateStreak();
    saveState();
}

// ============================================================
//  SM-2 알고리즘
// ============================================================
function sm2Update(word, quality) {
    // quality: 0(어려움) 3(보통) 5(쉬움)
    let { ef, repetition, interval } = word;
    if (quality >= 3) {
        if (repetition === 0) interval = 1;
        else if (repetition === 1) interval = 6;
        else interval = Math.round(interval * ef);
        repetition++;
    } else {
        repetition = 0;
        interval = 1;
    }
    ef = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
    if (ef < 1.3) ef = 1.3;

    const next = new Date();
    next.setDate(next.getDate() + interval);
    word.ef = ef;
    word.interval = interval;
    word.repetition = repetition;
    word.nextReview = next.toISOString().slice(0, 10);
}

// ============================================================
//  필터 / 단어장 
// ============================================================
function applyFilter() {
    const statusF = document.getElementById('filter-status').value;
    const diffF   = document.getElementById('filter-difficulty').value;
    const today   = todayStr();

    state.filteredIds = state.words
        .filter(w => {
            const sMatch = statusF === 'all' ? true :
                           statusF === 'starred' ? w.starred :
                           statusF === 'review' ? (w.nextReview && w.nextReview <= today) :
                           w.status === statusF;
            const dMatch = diffF === 'all' ? true : w.difficulty === diffF;
            return sMatch && dMatch;
        })
        .map(w => w.id);

    document.getElementById('filter-count').textContent = state.filteredIds.length + '개';
    state.currentIdx = 0;
    showCard();
}

function showCard() {
    if (state.filteredIds.length === 0) {
        document.getElementById('card-front-word').textContent = '단어가 없습니다';
        document.getElementById('card-back-meaning').textContent = '필터를 변경해 보세요';
        document.getElementById('card-counter').textContent = '0 / 0';
        return;
    }
    const idx = Math.min(state.currentIdx, state.filteredIds.length - 1);
    state.currentIdx = idx;
    const wid = state.filteredIds[idx];
    const word = state.words.find(w => w.id === wid);
    if (!word) return;

    // Reset flip
    document.getElementById('card-inner').classList.remove('flipped');

    document.getElementById('card-front-word').textContent = word.word;
    document.getElementById('card-back-meaning').textContent = word.meaning;
    document.getElementById('card-back-example').textContent = word.part || '';
    document.getElementById('card-part').textContent = word.part || '';
    document.getElementById('card-counter').textContent = `${idx + 1} / ${state.filteredIds.length}`;

    const badge = document.getElementById('card-difficulty-badge');
    badge.textContent = word.difficulty ? '난이도: ' + word.difficulty : '';

    const starBtn = document.getElementById('star-btn');
    if (word.starred) {
        starBtn.innerHTML = '<i class="fa-solid fa-star text-lg text-accent"></i>';
    } else {
        starBtn.innerHTML = '<i class="fa-regular fa-star text-lg"></i>';
    }

    logStudy();
    updateHeaderProgress();
}

function flipCard() {
    document.getElementById('card-inner').classList.toggle('flipped');
}

function prevCard() {
    if (state.filteredIds.length === 0) return;
    state.currentIdx = (state.currentIdx - 1 + state.filteredIds.length) % state.filteredIds.length;
    showCard();
}

function nextCard() {
    if (state.filteredIds.length === 0) return;
    state.currentIdx = (state.currentIdx + 1) % state.filteredIds.length;
    showCard();
}

function shuffleCards() {
    for (let i = state.filteredIds.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.filteredIds[i], state.filteredIds[j]] = [state.filteredIds[j], state.filteredIds[i]];
    }
    state.currentIdx = 0;
    showCard();
    showToast('카드 순서를 랜덤으로 섞었습니다!');
}

function toggleStar() {
    if (state.filteredIds.length === 0) return;
    const wid = state.filteredIds[state.currentIdx];
    const word = state.words.find(w => w.id === wid);
    if (!word) return;
    word.starred = !word.starred;
    saveState();
    showCard();
    showToast(word.starred ? '⭐ 즐겨찾기에 추가했습니다.' : '즐겨찾기에서 제거했습니다.');
}

function markStatus(level) {
    if (state.filteredIds.length === 0) return;
    const wid = state.filteredIds[state.currentIdx];
    const word = state.words.find(w => w.id === wid);
    if (!word) return;

    const q = level === 'easy' ? 5 : level === 'ok' ? 3 : 0;
    sm2Update(word, q);

    if (q === 5) word.status = 'learned';
    else if (q === 3) word.status = 'learning';
    else word.status = 'learning';

    saveState();
    renderStats();
    updateHeaderProgress();

    const labels = { hard: '다시 볼게요 😅', ok: '보통이에요 🙂', easy: '완벽해요 🎉' };
    showToast(labels[level]);

    setTimeout(() => nextCard(), 400);
}

// ============================================================
//  퀴즈
// ============================================================
function initQuiz() {
    const learned = state.words.filter(w => w.status === 'learned' || w.status === 'learning');
    const pool = learned.length >= 10 ? learned : state.words;
    state.quizQueue = shuffle([...pool]).slice(0, 20);
    state.quizIdx = 0;
    state.quizCorrect = 0;
    state.quizWrong = 0;
    updateQuizScore();
    showQuiz();
}

function showQuiz() {
    if (state.quizQueue.length === 0) {
        document.getElementById('quiz-word').textContent = '퀴즈할 단어가 없습니다';
        document.getElementById('quiz-choices').innerHTML = '';
        return;
    }
    if (state.quizIdx >= state.quizQueue.length) {
        endQuiz(); return;
    }

    const word = state.quizQueue[state.quizIdx];
    document.getElementById('quiz-word').textContent = word.word;
    document.getElementById('quiz-direction').textContent = '다음 영어 단어의 뜻은?';

    const pct = (state.quizIdx / state.quizQueue.length) * 100;
    document.getElementById('quiz-progress-bar').style.width = pct + '%';

    // 보기 4개 (정답 1 + 오답 3)
    const others = state.words.filter(w => w.id !== word.id);
    const wrongs = shuffle(others).slice(0, 3);
    const choices = shuffle([word, ...wrongs]);

    const container = document.getElementById('quiz-choices');
    container.innerHTML = '';
    choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'w-full text-left px-4 py-3 bg-slate-800 border border-bordercol rounded-xl text-sm text-white';
        btn.textContent = c.meaning;
        btn.onclick = () => checkQuizAnswer(c.id === word.id, btn, container);
        container.appendChild(btn);
    });

    document.getElementById('quiz-result').classList.add('hidden');
}

function checkQuizAnswer(isCorrect, clickedBtn, container) {
    const btns = container.querySelectorAll('button');
    btns.forEach(b => { b.disabled = true; b.style.opacity = '0.7'; });

    if (isCorrect) {
        clickedBtn.classList.add('correct');
        state.quizCorrect++;
        showToast('정답입니다! 🎉');
    } else {
        clickedBtn.classList.add('wrong');
        state.quizWrong++;
        showToast('틀렸습니다 😢');
    }
    updateQuizScore();
    document.getElementById('quiz-result').classList.remove('hidden');
    saveState();
}

function nextQuiz() {
    state.quizIdx++;
    showQuiz();
}

function endQuiz() {
    const total = state.quizCorrect + state.quizWrong;
    const pct = total > 0 ? Math.round((state.quizCorrect / total) * 100) : 0;
    document.getElementById('quiz-word').textContent = `퀴즈 완료! ${pct}% 정답`;
    document.getElementById('quiz-choices').innerHTML = `
        <div class="text-center py-4">
            <p class="text-slate-300 mb-4">맞음: ${state.quizCorrect}개 / 틀림: ${state.quizWrong}개</p>
            <button onclick="initQuiz()" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-emerald-600 transition">다시 도전하기</button>
        </div>`;
    document.getElementById('quiz-result').classList.add('hidden');
}

function updateQuizScore() {
    document.getElementById('quiz-correct').textContent = state.quizCorrect;
    document.getElementById('quiz-wrong').textContent = state.quizWrong;
}

// ============================================================
//  단어 목록
// ============================================================
function renderList(filtered) {
    const list = filtered || state.words;
    const container = document.getElementById('word-list');
    container.innerHTML = list.slice(0, 200).map(w => `
        <div class="word-item flex items-center gap-3 p-3 rounded-xl border border-bordercol cursor-pointer transition"
             onclick="gotoCard(${w.id})">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                    <span class="font-semibold text-white text-sm">${w.word}</span>
                    ${w.starred ? '<i class="fa-solid fa-star text-accent text-xs"></i>' : ''}
                    <span class="text-xs px-2 py-0.5 rounded-full ${statusBadge(w.status)}">${statusLabel(w.status)}</span>
                </div>
                <p class="text-slate-400 text-xs mt-0.5 truncate">${w.meaning}</p>
            </div>
            <span class="text-xs text-slate-600">${w.difficulty || ''}</span>
        </div>
    `).join('');
}

function statusBadge(s) {
    if (s === 'learned')   return 'bg-emerald-900/50 text-emerald-300';
    if (s === 'learning')  return 'bg-yellow-900/50 text-yellow-300';
    return 'bg-slate-700 text-slate-400';
}
function statusLabel(s) {
    if (s === 'learned')  return '완료';
    if (s === 'learning') return '학습 중';
    return '미학습';
}

function searchWords() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = state.words.filter(w => w.word.toLowerCase().includes(q) || w.meaning.includes(q));
    renderList(filtered);
}

function gotoCard(id) {
    const idx = state.filteredIds.indexOf(id);
    if (idx === -1) {
        // 필터 해제 후 이동
        document.getElementById('filter-status').value = 'all';
        document.getElementById('filter-difficulty').value = 'all';
        applyFilter();
        const idx2 = state.filteredIds.indexOf(id);
        if (idx2 !== -1) state.currentIdx = idx2;
    } else {
        state.currentIdx = idx;
    }
    switchTab('flashcard');
    showCard();
}

// ============================================================
//  통계
// ============================================================
function renderStats() {
    const total    = state.words.length;
    const learned  = state.words.filter(w => w.status === 'learned').length;
    const learning = state.words.filter(w => w.status === 'learning').length;
    const pct      = total > 0 ? Math.round((learned / total) * 100) : 0;

    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-learned').textContent  = learned;
    document.getElementById('stat-learning').textContent = learning;
    document.getElementById('stat-streak').textContent   = (state.streak || 0) + '일';
    document.getElementById('stat-pct').textContent      = pct + '%';
    document.getElementById('stat-progress').style.width = pct + '%';
}

function updateHeaderProgress() {
    const total   = state.words.length;
    const learned = state.words.filter(w => w.status === 'learned').length;
    document.getElementById('header-progress').textContent = `${learned} / ${total} 학습`;
}

// ============================================================
//  스트릭 잔디 그리드
// ============================================================
function renderStreakGrid() {
    const container = document.getElementById('streak-grid');
    const days = 90;
    const today = new Date();
    const cells = [];
    for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const count = (state.studyLog && state.studyLog[key]) || 0;
        const color = count === 0 ? 'bg-slate-700' :
                      count < 5  ? 'bg-emerald-900' :
                      count < 15 ? 'bg-emerald-700' :
                      count < 30 ? 'bg-emerald-500' : 'bg-emerald-300';
        cells.push(`<div class="streak-cell ${color}" title="${key}: ${count}회"></div>`);
    }
    container.innerHTML = cells.join('');
}

// ============================================================
//  탭 전환
// ============================================================
function switchTab(tab) {
    ['flashcard', 'quiz', 'list', 'stats'].forEach(t => {
        document.getElementById(`tab-${t}-content`).classList.add('hidden');
        document.getElementById(`tab-${t}`).classList.remove('active');
        document.getElementById(`tab-${t}`).classList.add('text-slate-400');
    });
    document.getElementById(`tab-${tab}-content`).classList.remove('hidden');
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.remove('text-slate-400');

    if (tab === 'stats') { renderStats(); renderStreakGrid(); }
    if (tab === 'list')  { renderList(); }
    if (tab === 'quiz')  { initQuiz(); }
}

// ============================================================
//  유틸
// ============================================================
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
//  키보드 단축키
// ============================================================
document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft')  prevCard();
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === ' ')          { e.preventDefault(); flipCard(); }
});

// ============================================================
//  시작
// ============================================================
init();
</script>
</body>
</html>
